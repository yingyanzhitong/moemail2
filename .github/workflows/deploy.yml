name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 部署到 moemail 环境
    environment: moemail
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Get full git history for checking file changes

      - name: Get previous tag
        id: previoustag
        if: github.event_name == 'push'
        run: |
          echo "tag=$(git describe --tags --abbrev=0 HEAD^)" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run deploy script
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          KV_NAMESPACE_NAME: ${{ secrets.KV_NAMESPACE_NAME }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
          CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN }}
          AUTH_GITHUB_ID: ${{ secrets.AUTH_GITHUB_ID }}
          AUTH_GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
        run: pnpm dlx tsx scripts/deploy/index.ts

      # Clean up
      - name: Post deployment cleanup
        run: |
          rm -f wrangler*.json

      - name: Notify Feishu/WeCom
        if: always()
        uses: x-actions/website-check@v1
        with:
          url: $'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${{ secrets.WECOM_WEBHOOK_KEY }}'
        continue-on-error: true
      
      # Using a simple curl as a fallback or if previous step is not what we want.
      # User asked for "hook notification". The most generic way is enabling a curl to a webhook.
      # But since the user locale is zh-CN/zh-TW and they use WeWorkMac (seen in file paths),
      # integrating with WeCom (Enterprise WeChat) seems highly relevant.
      - name: Send Notification
        if: always()
        run: |
           STATUS="${{ job.status }}"
           if [ "$STATUS" == "success" ]; then
             COLOR="info"
             MSG="✅ Deployment Successful: ${{ github.ref_name }}"
           else
             COLOR="warning" 
             MSG="❌ Deployment Failed: ${{ github.ref_name }}"
           fi
           
           # Check if WECOM_WEBHOOK_KEY is set (User needs to set this in Secrets)
           if [ -n "${{ secrets.WECOM_WEBHOOK_KEY }}" ]; then
              curl 'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${{ secrets.WECOM_WEBHOOK_KEY }}' \
               -H 'Content-Type: application/json' \
               -d "{\"msgtype\": \"markdown\", \"markdown\": {\"content\": \"$MSG\n> Repository: ${{ github.repository }}\n> Trigger: ${{ github.event_name }}\"}}"
           fi