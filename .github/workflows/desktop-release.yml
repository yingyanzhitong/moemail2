name: Desktop pre-release

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            runner: macos-15
            target: aarch64-apple-darwin
            bundles: dmg
            artifact: desktop-aarch64-apple-darwin
            artifact_path: desktop/smart-image-compressor/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - name: macOS Intel
            runner: macos-15-intel
            target: x86_64-apple-darwin
            bundles: dmg
            artifact: desktop-x86_64-apple-darwin
            artifact_path: desktop/smart-image-compressor/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - name: Windows x64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            bundles: nsis
            artifact: desktop-x86_64-pc-windows-msvc
            artifact_path: desktop/smart-image-compressor/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: desktop/smart-image-compressor
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: desktop/smart-image-compressor/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 校验设计系统与前端状态
        run: |
          pnpm design:lint
          pnpm test

      - name: 运行 Rust 测试
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: 构建并上传未签名测试版
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.runner, 'macos-') && '-' || '' }}
        with:
          projectPath: desktop/smart-image-compressor
          tagName: ${{ github.ref_name }}
          releaseName: TinyPNG 压缩助手 ${{ github.ref_name }}
          releaseBody: |
            未签名测试版。macOS 首次打开时可能需要在“隐私与安全性”中确认；Windows 可能显示 SmartScreen 提示。
          releaseDraft: false
          prerelease: true
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: 保留安装包用于 Gitee 镜像
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  sync-gitee:
    name: Sync installers to Gitee
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: 下载安装包
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-assets

      - name: 同步 Gitee Release 镜像
        env:
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
          GITEE_OWNER: masongzhi1
          GITEE_REPO: tinypng-image-compressor-releases
          GITEE_BRANCH: master
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_NAME: TinyPNG 压缩助手 ${{ github.ref_name }}
          RELEASE_BODY: 未签名测试版安装包镜像，由 GitHub Actions 自动同步。
          RELEASE_ASSET_DIR: release-assets
        run: node desktop/smart-image-compressor/scripts/sync-gitee-release.mjs
