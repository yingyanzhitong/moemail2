name: Desktop pre-release

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            runner: macos-15
            target: aarch64-apple-darwin
            bundles: app,dmg
            artifact: desktop-aarch64-apple-darwin
            artifact_path: |
              desktop/smart-image-compressor/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              desktop/smart-image-compressor/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
              desktop/smart-image-compressor/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          - name: macOS Intel
            runner: macos-15-intel
            target: x86_64-apple-darwin
            bundles: app,dmg
            artifact: desktop-x86_64-apple-darwin
            artifact_path: |
              desktop/smart-image-compressor/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
              desktop/smart-image-compressor/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
              desktop/smart-image-compressor/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          - name: Windows x64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            bundles: nsis
            artifact: desktop-x86_64-pc-windows-msvc
            artifact_path: |
              desktop/smart-image-compressor/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
              desktop/smart-image-compressor/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe.sig
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: desktop/smart-image-compressor
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: desktop/smart-image-compressor/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 校验设计系统与前端状态
        run: |
          pnpm design:lint
          pnpm test

      - name: 运行 Rust 测试
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: 构建带签名更新包
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: 保留安装包用于 Gitee 镜像
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish installers and updater manifest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-assets

      - name: 整理安装包与更新清单
        id: version
        run: |
          VERSION="$(node -p "require('./desktop/smart-image-compressor/package.json').version")"
          TAG="${{ github.ref_name }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          rm -rf normalized-release-assets
          node desktop/smart-image-compressor/scripts/prepare-release-assets.mjs \
            --input release-assets \
            --output normalized-release-assets \
            --owner masongzhi1 \
            --repo tinypng-image-compressor-releases \
            --app-name tinypng-image-compressor \
            --tag "$TAG" \
            --version "$VERSION" \
            --notes "TinyPNG 压缩助手 $VERSION 更新。"

      - name: 发布 GitHub 预发布安装包
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --target "$GITHUB_SHA" --title "TinyPNG 压缩助手 $TAG" --notes "未签名测试版，支持应用内签名更新。" --prerelease
          fi
          mapfile -d '' upload_files < <(find normalized-release-assets -type f -print0)
          gh release upload "$TAG" "${upload_files[@]}" --clobber

      - name: 同步 Gitee Release 镜像
        env:
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
          GITEE_OWNER: masongzhi1
          GITEE_REPO: tinypng-image-compressor-releases
          GITEE_BRANCH: master
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_NAME: TinyPNG 压缩助手 ${{ github.ref_name }}
          RELEASE_BODY: TinyPNG 压缩助手安装包与已签名更新包镜像，由 GitHub Actions 自动同步。
          RELEASE_ASSET_DIR: normalized-release-assets
          LATEST_JSON_PATH: normalized-release-assets/latest.json
        run: node desktop/smart-image-compressor/scripts/sync-gitee-release.mjs
